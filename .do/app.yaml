name: litxuscount
region: sgp1

databases:
  - name: db
    engine: PG
    version: "16"
    production: false # "Dev Database" tier — cheapest option for trying things out, no failover/backups. Upgrade to a Managed Database for real use.

services:
  - name: api
    dockerfile_path: src/LitXusCount.API/Dockerfile
    source_dir: /
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
    routes:
      - path: /api
        preserve_path_prefix: true
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: "Production"
      - key: SEED_DEMO_DATA
        value: "true" # creates SuperAdmin/Admin dev accounts + reference data so you can log in on first deploy. Set to "false" once you've created real accounts.
      - key: ConnectionStrings__DefaultConnection
        value: "Host=${db.HOSTNAME};Port=${db.PORT};Database=${db.DATABASE};Username=${db.USERNAME};Password=${db.PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
        type: SECRET
      - key: Jwt__Issuer
        value: "LitXusCount.API"
      - key: Jwt__Audience
        value: "LitXusCount.Client"
      - key: Jwt__SigningKey
        value: "REPLACE_BEFORE_DEPLOY_32CHARS_MIN_RANDOM_SECRET"
        type: SECRET
      - key: Jwt__AccessTokenMinutes
        value: "30"
      - key: Jwt__RefreshTokenDays
        value: "14"
      - key: Cors__AllowedOrigins__0
        value: "${APP_URL}"

static_sites:
  - name: web
    source_dir: Web/admin-dashboard
    build_command: npm ci && npm run build
    output_dir: dist
    routes:
      - path: /
    envs:
      - key: VITE_API_BASE_URL
        value: "" # empty = relative requests, works because /api is routed to the api service on the same domain
